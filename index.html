<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauvetage de la Forêt - Fractions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #1a202c;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1000px;
            max-height: 750px;
            margin: 0 auto;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%, #4CAF50 60%, #2E7D32 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Barre de temps */
        #time-bar-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            border: 2px solid white;
            overflow: hidden;
            z-index: 30;
        }
        #time-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f87171, #fbbf24, #34d399);
            transition: width 1s linear;
        }

        /* Question flottante */
        #ui-question {
            position: absolute;
            pointer-events: none;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.1s ease-out;
        }
        #question-box {
            background: white;
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 4px solid #3b82f6;
            font-size: 2.2rem;
            font-weight: bold;
            color: #1e3a8a;
            white-space: nowrap;
        }

        /* Options Fractions (en bas) */
        #ui-options-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            z-index: 50;
        }
        .fraction-btn {
            background: white;
            border: 3px solid #cbd5e1;
            box-shadow: 0 6px 0 #94a3b8;
            border-radius: 16px;
            width: 110px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            padding: 10px;
        }
        .fraction-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #94a3b8;
        }
        .fraction-btn svg {
            width: 100%;
            height: 100%;
            max-height: 70px;
        }
        .fraction-btn:hover {
            border-color: #3b82f6;
            background-color: #f0f9ff;
        }

        /* Écrans overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-blur: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: white;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 8px solid #3b82f6;
        }

        .hidden { display: none !important; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 100; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="game-container">
        <canvas id="gameCanvas" width="1000" height="750"></canvas>

        <!-- Page d'Accueil -->
        <div id="start-screen" class="overlay">
            <div class="modal border-green-500">
                <h1 class="text-5xl font-extrabold text-green-600 mb-4 italic">MISSION HELI-FEU</h1>
                <h2 class="text-3xl text-blue-600 font-bold mb-6">Spécial Fractions</h2>
                
                <div class="text-xl text-gray-700 mb-8 leading-relaxed">
                    <p>La forêt est en feu ! 🔥</p>
                    <p class="mt-2">Choisis la bonne représentation (camembert ou rectangle) pour la fraction demandée par l'hélicoptère.</p>
                    <p class="mt-4 font-bold text-red-500">15 questions pour éteindre l'incendie !</p>
                </div>
                
                <div class="flex flex-col gap-4">
                    <button class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-2xl text-2xl font-bold shadow-xl transition-all hover:scale-105 active:scale-95" onclick="demarrerJeu(1)">
                        NIVEAU 1<br><span class="text-lg font-normal">Demis, Tiers, Quarts</span>
                    </button>
                    <button class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-4 rounded-2xl text-2xl font-bold shadow-xl transition-all hover:scale-105 active:scale-95" onclick="demarrerJeu(2)">
                        NIVEAU 2<br><span class="text-lg font-normal">Jusqu'aux Sixièmes</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Éléments de jeu -->
        <div id="game-ui" class="hidden">
            <!-- Barre de Temps -->
            <div id="time-bar-container">
                <div id="time-bar"></div>
            </div>

            <!-- Infos Question -->
            <div class="absolute top-4 right-6 bg-white/90 px-4 py-2 rounded-2xl shadow-lg border-2 border-purple-400 text-xl font-bold z-20">
                Q: <span id="question-count">1</span>/15
            </div>

            <!-- Question flottante au dessus de l'hélico -->
            <div id="ui-question">
                <div id="question-box">
                    <span id="question-text">Un demi</span>
                </div>
                <div id="feedback" class="mt-2 text-xl font-bold opacity-0 px-4 py-1 rounded-full bg-white shadow-md"></div>
            </div>

            <!-- Options 4 Choix -->
            <div id="ui-options-container">
                <button class="fraction-btn" onclick="valider(0)" id="btn-opt-0"></button>
                <button class="fraction-btn" onclick="valider(1)" id="btn-opt-1"></button>
                <button class="fraction-btn" onclick="valider(2)" id="btn-opt-2"></button>
                <button class="fraction-btn" onclick="valider(3)" id="btn-opt-3"></button>
            </div>
        </div>

        <!-- Écran de Fin -->
        <div id="end-screen" class="overlay hidden">
            <div class="modal border-yellow-400">
                <h2 id="end-title" class="text-5xl font-bold mb-4 text-blue-600">Bravo !</h2>
                <div id="reward-container" class="flex justify-center gap-4 text-6xl mb-6"></div>
                <p id="end-score" class="text-3xl font-bold mb-8 text-gray-700">Score : 0 / 15</p>
                <button class="bg-green-500 hover:bg-green-600 text-white px-10 py-4 rounded-2xl text-3xl font-bold shadow-lg transition-transform active:scale-95" onclick="location.reload()">Rejouer</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Configuration du Jeu
        const TOTAL_QUESTIONS = 15;
        const DUREE_INITIALE = 150; 
        let timer = DUREE_INITIALE;
        let questionActive = 1;
        let score = 0;
        let jeuFini = false;
        let jeuDemarre = false;
        let niveauActuel = 1;

        // Variables de la question en cours
        let indexReponseCorrecte = -1;
        let poolFractions = [];
        let enAttente = false;

        // État visuel du canvas
        let lastTime = 0;
        let feux = [];
        let nuages = [];
        let gouttes = [];
        let particulesFumee = [];

        // Assets
        const foretImage = new Image();
        foretImage.src = 'forêt.png';
        let foretImageLoaded = false;
        foretImage.onload = () => foretImageLoaded = true;

        const helicoImage = new Image();
        helicoImage.src = 'hélicoptère.png';
        let helicoImageLoaded = false;
        helicoImage.onload = () => helicoImageLoaded = true;

        let helico = { x: 500, y: 180, targetX: 500, etat: 'patrouille', vitesse: 350, cibleFeu: null };

        // --- GÉNÉRATION FRACTIONS ET SVG ---

        // Convertit numérateur/dénominateur en texte
        function fractionEnTexte(n, d) {
            const numerateurs = ["zéro", "Un", "Deux", "Trois", "Quatre", "Cinq", "Six"];
            const denominateurs = ["", "", "demi", "tiers", "quart", "cinquième", "sixième"];
            
            let numStr = numerateurs[n];
            let denStr = denominateurs[d];
            
            // Accords au pluriel
            if (n > 1 && d !== 3) { 
                denStr += "s"; // tiers prend déjà un 's', les autres s'accordent
            }
            return `${numStr} ${denStr}`;
        }

        // Crée le code SVG d'un camembert (cercle divisé)
        function creerSVGCamembert(n, d) {
            let svg = `<svg viewBox="-55 -55 110 110">`;
            const rayon = 50;
            if (n === d) {
                svg += `<circle cx="0" cy="0" r="${rayon}" fill="#3b82f6" stroke="#1e293b" stroke-width="3"/>`;
            } else if (n === 0) {
                svg += `<circle cx="0" cy="0" r="${rayon}" fill="#e2e8f0" stroke="#1e293b" stroke-width="3"/>`;
            } else {
                const angleParPart = (Math.PI * 2) / d;
                // Rotation de -90deg pour commencer en haut
                svg += `<g transform="rotate(-90)">`;
                for(let i=0; i<d; i++) {
                    let fill = i < n ? '#3b82f6' : '#e2e8f0'; // Bleu si colorié, gris sinon
                    let startAngle = i * angleParPart;
                    let endAngle = (i + 1) * angleParPart;
                    let x1 = rayon * Math.cos(startAngle);
                    let y1 = rayon * Math.sin(startAngle);
                    let x2 = rayon * Math.cos(endAngle);
                    let y2 = rayon * Math.sin(endAngle);
                    let grandArc = (endAngle - startAngle > Math.PI) ? 1 : 0;
                    
                    let chemin = `M 0 0 L ${x1} ${y1} A ${rayon} ${rayon} 0 ${grandArc} 1 ${x2} ${y2} Z`;
                    svg += `<path d="${chemin}" fill="${fill}" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>`;
                }
                svg += `</g>`;
            }
            svg += `</svg>`;
            return svg;
        }

        // Crée le code SVG d'un rectangle unité divisé
        function creerSVGRectangle(n, d) {
            let svg = `<svg viewBox="0 0 100 40">`;
            let largeurPart = 100 / d;
            for(let i=0; i<d; i++) {
                let fill = i < n ? '#22c55e' : '#f1f5f9'; // Vert si colorié, blanc cassé sinon
                svg += `<rect x="${i*largeurPart}" y="2" width="${largeurPart}" height="36" fill="${fill}" stroke="#1e293b" stroke-width="2"/>`;
            }
            svg += `</svg>`;
            return svg;
        }

        // --- LOGIQUE DU JEU ---
        function demarrerJeu(niveau) {
            niveauActuel = niveau;
            jeuDemarre = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            // Remplir le pool de fractions possibles selon le niveau
            let maxDenominateur = (niveau === 1) ? 4 : 6;
            for (let d = 2; d <= maxDenominateur; d++) {
                for (let n = 1; n <= d; n++) {
                    poolFractions.push({n: n, d: d});
                }
            }

            initDecor();
            startTimer();
            genererQuestion();
            ajouterFeu();
        }

        function initDecor() {
            for(let i=0; i<6; i++) {
                nuages.push({
                    x: Math.random() * canvas.width, y: 30 + Math.random() * 100,
                    taille: 30 + Math.random() * 40, vitesse: 10 + Math.random() * 15
                });
            }
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                if (jeuFini) { clearInterval(timerInterval); return; }
                timer--;
                document.getElementById('time-bar').style.width = ((timer / DUREE_INITIALE) * 100) + '%';
                if (timer <= 0) terminerJeu();
            }, 1000);
        }

        function genererQuestion() {
            if (questionActive > TOTAL_QUESTIONS) { terminerJeu(); return; }
            enAttente = false;
            document.getElementById('question-count').innerText = questionActive;

            // 1. Choisir la bonne fraction
            const correcte = poolFractions[Math.floor(Math.random() * poolFractions.length)];
            
            // 2. Choisir 3 distracteurs uniques (sans équivalences)
            let options = [correcte];
            while (options.length < 4) {
                let distractor = poolFractions[Math.floor(Math.random() * poolFractions.length)];
                // Vérifie si la valeur de la fraction (n/d) n'est pas déjà dans les options pour éviter les égalités (ex: 1/2 et 2/4)
                if (!options.some(opt => (opt.n / opt.d) === (distractor.n / distractor.d))) {
                    options.push(distractor);
                }
            }

            // 3. Mélanger les 4 options
            options.sort(() => Math.random() - 0.5);
            indexReponseCorrecte = options.findIndex(opt => opt.n === correcte.n && opt.d === correcte.d);

            // 4. Mettre à jour la question (texte ou chiffre - 50% de chance)
            const typeQuestion = Math.random() < 0.5 ? 'texte' : 'chiffre';
            const qBox = document.getElementById('question-text');
            if (typeQuestion === 'texte') {
                qBox.innerText = fractionEnTexte(correcte.n, correcte.d);
            } else {
                qBox.innerText = `${correcte.n} / ${correcte.d}`;
            }

            // 5. Générer les visuels des boutons (Camembert ou Rectangle - aléatoire par question)
            const typeVisuel = Math.random() < 0.5 ? 'camembert' : 'rectangle';
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`btn-opt-${i}`);
                if (typeVisuel === 'camembert') {
                    btn.innerHTML = creerSVGCamembert(options[i].n, options[i].d);
                } else {
                    btn.innerHTML = creerSVGRectangle(options[i].n, options[i].d);
                }
            }
        }

        function valider(indexChoisi) {
            if (jeuFini || !jeuDemarre || enAttente) return;
            enAttente = true;

            if (indexChoisi === indexReponseCorrecte) {
                afficherFeedback("Super ! 💧", "text-green-600");
                score++;
                if (feux.length > 0) {
                    let pireFeu = feux.reduce((p, c) => (p.intensite > c.intensite) ? p : c);
                    helico.cibleFeu = pireFeu;
                    helico.targetX = pireFeu.x;
                    helico.etat = 'en_route';
                }
            } else {
                afficherFeedback("Oups, retente ! ❌", "text-red-600");
            }
            
            questionActive++;
            setTimeout(genererQuestion, 1500);
        }

        function afficherFeedback(msg, classes) {
            const f = document.getElementById('feedback');
            f.innerText = msg;
            f.className = `mt-2 text-2xl font-bold px-5 py-2 rounded-full bg-white shadow-md ${classes}`;
            f.style.opacity = 1;
            setTimeout(() => f.style.opacity = 0, 1500);
        }

        // --- FIN DU JEU ---
        function terminerJeu() {
            jeuFini = true;
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            
            const scoreDisplay = document.getElementById('end-score');
            scoreDisplay.innerText = `Score : ${score} / ${TOTAL_QUESTIONS}`;
            
            const rewards = document.getElementById('reward-container');
            const title = document.getElementById('end-title');
            
            if (score === TOTAL_QUESTIONS) {
                title.innerText = "Sapeur Pompier !";
                rewards.innerHTML = "🚒 🏆 💧";
                lancerConfettis();
            } else if (score >= 12) {
                title.innerText = "Excellent !";
                rewards.innerHTML = "⭐ ⭐ ⭐";
            } else if (score >= 8) {
                title.innerText = "Bien joué !";
                rewards.innerHTML = "⭐ ⭐";
            } else {
                title.innerText = "Encore un effort !";
                rewards.innerHTML = "⭐";
            }
        }

        function lancerConfettis() {
            for(let i=0; i<100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                document.getElementById('game-container').appendChild(c);
                const anim = c.animate([
                    { top: '-10px', transform: `rotate(0deg)` },
                    { top: '100vh', transform: `rotate(720deg) translateX(${Math.random()*200 - 100}px)` }
                ], { duration: 2000 + Math.random()*3000 });
                anim.onfinish = () => c.remove();
            }
        }

        // --- MOTEUR GRAPHIQUE ---
        function ajouterFeu() {
            if (feux.length < 4) {
                feux.push({
                    x: 100 + Math.random() * (canvas.width - 200),
                    y: 580,
                    intensite: 20, maxIntensite: 100
                });
            }
        }

        function lacherEau() {
            for(let i=0; i<50; i++) {
                gouttes.push({
                    x: helico.x + (Math.random() * 50 - 25),
                    y: helico.y + 40,
                    vy: 300 + Math.random() * 200,
                    vx: (Math.random() * 40 - 20)
                });
            }
        }

        function update(dt) {
            if (!jeuDemarre || jeuFini) return;

            // Feux et Fumées
            feux.forEach(f => {
                f.intensite += 4 * dt; 
                if (f.intensite > f.maxIntensite) f.intensite = f.maxIntensite;
                if (Math.random() < f.intensite / 100) {
                    particulesFumee.push({
                        x: f.x + (Math.random()*60-30), y: f.y,
                        vx: Math.random()*20-10, vy: -70 - Math.random()*80,
                        taille: 15 + Math.random()*30, opacite: 0.7
                    });
                }
            });
            if (Math.random() < 0.08 * dt && feux.length < 3) ajouterFeu();

            for(let i=particulesFumee.length-1; i>=0; i--) {
                let p = particulesFumee[i];
                p.x += p.vx * dt; p.y += p.vy * dt;
                p.taille += 15 * dt; p.opacite -= 0.5 * dt;
                if (p.opacite <= 0) particulesFumee.splice(i, 1);
            }

            // Nuages
            nuages.forEach(n => {
                n.x += n.vitesse * dt;
                if (n.x > canvas.width + 100) n.x = -100;
            });

            // Eau
            for(let i=gouttes.length-1; i>=0; i--) {
                let g = gouttes[i];
                g.x += g.vx * dt; g.y += g.vy * dt;
                if (g.y > 580) {
                    gouttes.splice(i, 1);
                    feux.forEach(f => {
                        if (Math.abs(f.x - g.x) < 80) f.intensite -= 3.5;
                    });
                }
            }
            feux = feux.filter(f => f.intensite > 5);

            // Déplacement Hélicoptère
            if (helico.etat === 'patrouille') {
                helico.targetX = 500 + Math.sin(Date.now() / 2500) * 350;
                helico.x += (helico.targetX - helico.x) * 0.015;
            } else if (helico.etat === 'en_route') {
                let dist = helico.targetX - helico.x;
                if (Math.abs(dist) < 10) {
                    helico.etat = 'largage';
                    lacherEau();
                } else {
                    helico.x += Math.sign(dist) * helico.vitesse * dt;
                }
            } else if (helico.etat === 'largage') {
                if (gouttes.length === 0) helico.etat = 'patrouille';
            }

            // Suivi de l'UI
            const uiQ = document.getElementById('ui-question');
            uiQ.style.left = (helico.x - uiQ.offsetWidth / 2) + "px";
            uiQ.style.top = (helico.y - 100) + "px";
        }

        function drawHelicoptereFallback(ctx, x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = '#E53E3E'; ctx.beginPath(); ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(-70, -5, 40, 10); ctx.fillStyle = '#2D3748';
            ctx.save(); ctx.translate(0, -25); ctx.rotate(Date.now() / 50); ctx.fillRect(-60, -2, 120, 4); ctx.restore();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Nuages
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            nuages.forEach(n => { ctx.beginPath(); ctx.arc(n.x, n.y, n.taille, 0, Math.PI*2); ctx.fill(); });
            
            // Forêt
            if (foretImageLoaded) {
                ctx.drawImage(foretImage, 0, canvas.height - 450, canvas.width, 450);
            } else {
                ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, canvas.height - 400, canvas.width, 400);
            }

            if (!jeuDemarre) return;

            // Fumées
            particulesFumee.forEach(p => {
                ctx.fillStyle = `rgba(100, 100, 100, ${p.opacite})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.taille, 0, Math.PI*2); ctx.fill();
            });
            // Gouttes d'eau
            ctx.fillStyle = '#3b82f6';
            gouttes.forEach(g => {
                ctx.beginPath(); ctx.ellipse(g.x, g.y, 5, 10, 0, 0, Math.PI * 2); ctx.fill();
            });
            // Hélico
            if (helicoImageLoaded) {
                let hW = 160, hH = (helicoImage.height / helicoImage.width) * hW;
                ctx.save(); ctx.translate(helico.x, helico.y);
                ctx.rotate((helico.targetX - helico.x) * 0.0005);
                ctx.drawImage(helicoImage, -hW/2, -hH/2, hW, hH);
                ctx.restore();
            } else {
                drawHelicoptereFallback(ctx, helico.x, helico.y);
            }
        }

        function gameLoop(ts) {
            if (!lastTime) lastTime = ts;
            update((ts - lastTime) / 1000);
            draw();
            lastTime = ts;
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
