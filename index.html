<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sauvetage de la Forêt - Fractions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a202c;
            font-family: 'Comic Neue', cursive, sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Barre de temps responsive */
        #time-bar-container {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            border: 2px solid white;
            overflow: hidden;
            z-index: 30;
        }
        #time-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f87171, #fbbf24, #34d399);
            transition: width 1s linear;
        }

        /* Question flottante */
        #ui-question {
            position: absolute;
            pointer-events: none;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.1s ease-out;
        }
        #question-box {
            background: white;
            padding: 8px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #3b82f6;
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: bold;
            color: #1e3a8a;
            white-space: nowrap;
        }

        /* Options Fractions */
        #ui-options-container {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding: 0 10px;
            z-index: 50;
            justify-items: center;
        }

        @media (min-width: 768px) {
            #ui-options-container {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 20px;
            }
        }

        .fraction-btn {
            background: white;
            border: 3px solid #cbd5e1;
            box-shadow: 0 4px 0 #94a3b8;
            border-radius: 12px;
            width: 100%;
            max-width: 130px;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            padding: 8px;
        }
        .fraction-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #94a3b8;
        }
        .fraction-btn svg {
            width: 100%;
            height: 100%;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-blur: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 6px solid #3b82f6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- Accueil -->
        <div id="start-screen" class="overlay">
            <div class="modal border-green-500">
                <h1 class="text-3xl md:text-4xl font-extrabold text-green-600 mb-2 italic">MISSION HELI-FEU</h1>
                <h2 class="text-xl md:text-2xl text-blue-600 font-bold mb-4">Spécial Fractions</h2>
                <div class="text-sm md:text-base text-gray-700 mb-6">
                    <p>Choisis la bonne image pour éteindre le feu !</p>
                    <p class="font-bold text-red-500 mt-2">12 questions pour sauver la forêt.</p>
                </div>
                <div class="flex flex-col gap-3">
                    <button class="bg-blue-500 text-white p-4 rounded-xl font-bold shadow-lg text-lg" onclick="demarrerJeu(1)">NIVEAU 1 (1/2, 1/3, 1/4)</button>
                    <button class="bg-purple-500 text-white p-4 rounded-xl font-bold shadow-lg text-lg" onclick="demarrerJeu(2)">NIVEAU 2 (Jusqu'à 1/6)</button>
                </div>
            </div>
        </div>

        <!-- Interface de jeu -->
        <div id="game-ui" class="hidden">
            <div id="time-bar-container"><div id="time-bar"></div></div>
            <div class="absolute top-2 right-4 bg-white/90 px-3 py-1 rounded-xl border-2 border-purple-400 font-bold text-sm md:text-lg z-20">
                Q: <span id="question-count">1</span>/12
            </div>
            <div id="ui-question">
                <div id="question-box"><span id="question-text"></span></div>
                <div id="feedback" class="mt-1 text-sm md:text-lg font-bold opacity-0 px-3 py-1 rounded-full bg-white shadow-md"></div>
            </div>
            <div id="ui-options-container">
                <button class="fraction-btn" onclick="valider(0)" id="btn-opt-0"></button>
                <button class="fraction-btn" onclick="valider(1)" id="btn-opt-1"></button>
                <button class="fraction-btn" onclick="valider(2)" id="btn-opt-2"></button>
                <button class="fraction-btn" onclick="valider(3)" id="btn-opt-3"></button>
            </div>
        </div>

        <!-- Fin -->
        <div id="end-screen" class="overlay hidden">
            <div class="modal border-yellow-400 flex flex-col items-center">
                
                <!-- Coupe de champion (Cachée par défaut) -->
                <div id="end-cup" class="hidden w-full flex justify-center mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#fbbf24" class="w-24 h-24 drop-shadow-md">
                        <path d="M400 32H48C21.5 32 0 53.5 0 80v16c0 41.4 33.6 75 75 75h22.6c18 34.3 49.3 59.7 87.7 70.4L166 331.6c-4.4 12.3-17.6 19.3-30.7 16.1l-36-8.9c-15.6-3.9-31.5 5.6-35.4 21.3l-5.6 22.5c-3.9 15.6 5.6 31.5 21.3 35.4l112 27.8c15.6 3.9 31.5-5.6 35.4-21.3l5.6-22.5c3.9-15.6-5.6-31.5-21.3-35.4l-36-8.9c-13.1-3.2-22.5-15.4-20.9-28.7L181 241.4c34.8 0 66-14.8 88-38.5 22 23.7 53.2 38.5 88 38.5l26.6 87.5c1.6 13.3-7.8 25.5-20.9 28.7l-36 8.9c-15.6 3.9-25.2 19.8-21.3 35.4l5.6 22.5c3.9 15.6 19.8 25.2 35.4 21.3l112-27.8c15.6-3.9 25.2-19.8 21.3-35.4l-5.6-22.5c-3.9-15.6-19.8-25.2-35.4-21.3l-36-8.9c-13.1-3.2-26.3-10.3-30.7-22.6l-19.3-90.2c38.4-10.7 69.7-36.1 87.7-70.4H437c41.4 0 75-33.6 75-75V80c0-26.5-21.5-48-48-48zM75 123c-15.4 0-28-12.6-28-28V80h63.2c-5.4 13.1-8.2 27.6-8.2 43v2.8L75 123zm362-28c0 15.4-12.6 28-28 28h-27.1v-2.8c0-15.4-2.8-29.9-8.2-43H437v22.8z"/>
                    </svg>
                </div>

                <h2 id="end-title" class="text-3xl font-bold mb-4 text-blue-600">Bravo !</h2>
                
                <!-- Système d'étoiles -->
                <div id="end-stars" class="flex justify-center gap-2 mb-4 w-full">
                </div>

                <p id="end-score" class="text-xl font-bold mb-6 text-gray-700">Score : 0 / 12</p>
                <button class="bg-green-500 hover:bg-green-600 transition-colors text-white px-8 py-3 rounded-xl text-xl font-bold shadow-lg" onclick="location.reload()">Rejouer</button>
            </div>
        </div>

        <!-- Feedback Erreur (Pause) -->
        <div id="error-screen" class="overlay hidden">
            <div class="modal border-red-500">
                <h2 class="text-3xl font-bold mb-4 text-red-600">Oups !</h2>
                <p class="text-xl mb-4 text-gray-700">La bonne réponse pour :</p>
                <div id="correct-question-display" class="text-3xl font-extrabold text-blue-600 mb-4 bg-blue-50 py-2 px-6 rounded-xl inline-block border-2 border-blue-200"></div>
                <p class="text-xl mb-4 text-gray-700">était :</p>
                <div id="correct-answer-display" class="mx-auto w-40 h-40 mb-8 bg-gray-50 rounded-2xl p-4 border-4 border-gray-200 flex items-center justify-center [&>svg]:w-full [&>svg]:h-full"></div>
                <button class="bg-blue-500 hover:bg-blue-600 transition-colors text-white px-8 py-3 rounded-xl text-xl font-bold" onclick="continuerApresErreur()">Continuer</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let baseWidth = window.innerWidth;
        let baseHeight = window.innerHeight;

        // Hélicoptère initialisé au centre
        let helico = { x: baseWidth/2, y: baseHeight * 0.35, targetX: baseWidth/2, etat: 'patrouille', vitesse: baseWidth * 0.4, tilt: 0 };

        function resize() {
            baseWidth = window.innerWidth;
            baseHeight = window.innerHeight;
            canvas.width = baseWidth;
            canvas.height = baseHeight;
            helico.y = baseHeight * 0.35; // Maintient l'hélico à la bonne hauteur
            helico.vitesse = baseWidth * 0.4;
        }
        window.addEventListener('resize', resize);
        resize();

        // État du jeu
        const TOTAL_QUESTIONS = 12;
        const DUREE_INITIALE = 150; 
        let timer = DUREE_INITIALE;
        let questionActive = 1;
        let score = 0;
        let jeuFini = false;
        let jeuDemarre = false;
        let jeuEnPause = false;
        let niveauActuel = 1;
        let poolFractions = [];
        let indexReponseCorrecte = -1;
        let enAttente = false;
        let lastTime = 0;
        let feux = [], nuages = [], gouttes = [], particulesFumee = [], confettis = [];

        // Images
        const helicoImage = new Image();
        helicoImage.src = 'hélicoptère.png';
        let helicoLoaded = false;
        helicoImage.onload = () => helicoLoaded = true;

        const foretImage = new Image();
        foretImage.src = 'forêt.png';
        let foretLoaded = false;
        foretImage.onload = () => foretLoaded = true;

        function fractionEnTexte(n, d) {
            const numerateurs = ["zéro", "Un", "Deux", "Trois", "Quatre", "Cinq", "Six"];
            const denominateurs = ["", "", "demi", "tiers", "quart", "cinquième", "sixième"];
            let numStr = numerateurs[n], denStr = denominateurs[d];
            if (n > 1 && d !== 3) denStr += "s";
            return `${numStr} ${denStr}`;
        }

        function creerSVGCamembert(n, d) {
            let svg = `<svg viewBox="-55 -55 110 110">`;
            const rayon = 50;
            if (n === d) {
                svg += `<circle cx="0" cy="0" r="${rayon}" fill="#3b82f6" stroke="#1e293b" stroke-width="3"/>`;
            } else {
                const angleParPart = (Math.PI * 2) / d;
                svg += `<g transform="rotate(-90)">`;
                for(let i=0; i<d; i++) {
                    let fill = i < n ? '#3b82f6' : '#e2e8f0';
                    let startAngle = i * angleParPart, endAngle = (i + 1) * angleParPart;
                    let x1 = rayon * Math.cos(startAngle), y1 = rayon * Math.sin(startAngle);
                    let x2 = rayon * Math.cos(endAngle), y2 = rayon * Math.sin(endAngle);
                    let grandArc = (endAngle - startAngle > Math.PI) ? 1 : 0;
                    svg += `<path d="M 0 0 L ${x1} ${y1} A ${rayon} ${rayon} 0 ${grandArc} 1 ${x2} ${y2} Z" fill="${fill}" stroke="#1e293b" stroke-width="3"/>`;
                }
                svg += `</g>`;
            }
            return svg + `</svg>`;
        }

        function creerSVGRectangle(n, d) {
            let svg = `<svg viewBox="0 0 100 40">`;
            let lp = 100 / d;
            for(let i=0; i<d; i++) {
                let fill = i < n ? '#22c55e' : '#f1f5f9';
                svg += `<rect x="${i*lp}" y="2" width="${lp}" height="36" fill="${fill}" stroke="#1e293b" stroke-width="2"/>`;
            }
            return svg + `</svg>`;
        }

        function demarrerJeu(niveau) {
            niveauActuel = niveau;
            jeuDemarre = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            let maxD = (niveau === 1) ? 4 : 6;
            for (let d = 2; d <= maxD; d++) for (let n = 1; n <= d; n++) poolFractions.push({n, d});
            for(let i=0; i<6; i++) nuages.push({x: Math.random()*baseWidth, y: baseHeight*0.05 + Math.random()*(baseHeight*0.15), t: 30+Math.random()*40, v: 10+Math.random()*15});
            
            setInterval(() => {
                if (jeuFini || jeuEnPause || !jeuDemarre) return;
                timer--;
                document.getElementById('time-bar').style.width = ((timer / DUREE_INITIALE) * 100) + '%';
                if (timer <= 0) terminerJeu();
            }, 1000);

            genererQuestion();
            
            // On augmente le nombre de départs de feux initiaux
            ajouterFeu();
            ajouterFeu();
            ajouterFeu();
        }

        function genererQuestion() {
            if (questionActive > TOTAL_QUESTIONS) { terminerJeu(); return; }
            enAttente = false;
            document.getElementById('question-count').innerText = questionActive;
            const correcte = poolFractions[Math.floor(Math.random() * poolFractions.length)];
            let options = [correcte];
            while (options.length < 4) {
                let dist = poolFractions[Math.floor(Math.random() * poolFractions.length)];
                if (!options.some(opt => (opt.n / opt.d) === (dist.n / dist.d))) options.push(dist);
            }
            options.sort(() => Math.random() - 0.5);
            indexReponseCorrecte = options.findIndex(o => o.n === correcte.n && o.d === correcte.d);
            
            const typeQ = Math.random() < 0.5 ? 'texte' : 'chiffre';
            document.getElementById('question-text').innerText = typeQ === 'texte' ? fractionEnTexte(correcte.n, correcte.d) : `${correcte.n} / ${correcte.d}`;
            const typeV = Math.random() < 0.5 ? 'cam' : 'rec';
            for (let i = 0; i < 4; i++) document.getElementById(`btn-opt-${i}`).innerHTML = typeV === 'cam' ? creerSVGCamembert(options[i].n, options[i].d) : creerSVGRectangle(options[i].n, options[i].d);
        }

        function valider(idx) {
            if (jeuFini || !jeuDemarre || enAttente || jeuEnPause) return;
            enAttente = true;
            if (idx === indexReponseCorrecte) {
                score++;
                if (feux.length > 0) {
                    let f = feux.reduce((p, c) => (p.i > c.i) ? p : c);
                    helico.targetX = f.x; helico.etat = 'en_route';
                }
                afficherFeedback("Bravo ! 💧", "text-green-600");
                questionActive++;
                setTimeout(genererQuestion, 1500);
            } else {
                jeuEnPause = true;
                document.getElementById('error-screen').classList.remove('hidden');
                document.getElementById('correct-question-display').innerText = document.getElementById('question-text').innerText;
                document.getElementById('correct-answer-display').innerHTML = document.getElementById(`btn-opt-${indexReponseCorrecte}`).innerHTML;
            }
        }

        function continuerApresErreur() {
            document.getElementById('error-screen').classList.add('hidden');
            jeuEnPause = false;
            questionActive++;
            genererQuestion();
        }

        function afficherFeedback(msg, cls) {
            const f = document.getElementById('feedback');
            f.innerText = msg; f.className = `mt-1 text-lg font-bold px-4 py-1 rounded-full bg-white shadow-md ${cls}`;
            f.style.opacity = 1; setTimeout(() => f.style.opacity = 0, 1500);
        }

        function terminerJeu() {
            jeuFini = true;
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            // Calcul des étoiles
            let nbEtoiles = 1;
            if (score >= 6 && score <= 11) nbEtoiles = 2;
            else if (score === 12) nbEtoiles = 3;

            // Affichage des étoiles
            const starsContainer = document.getElementById('end-stars');
            starsContainer.innerHTML = '';
            for(let i = 1; i <= 3; i++) {
                let colorClass = i <= nbEtoiles ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]' : 'text-gray-200';
                starsContainer.innerHTML += `
                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-16 h-16 md:w-20 md:h-20 ${colorClass}">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>`;
            }

            // Affichage de la coupe et confettis pour un sans-faute
            const endTitle = document.getElementById('end-title');
            const endCup = document.getElementById('end-cup');
            if (score === 12) {
                endTitle.innerText = "CHAMPION !";
                endTitle.className = "text-4xl font-extrabold mb-4 text-yellow-500 uppercase";
                endCup.classList.remove('hidden');
                
                // Génération des confettis
                const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#f472b6'];
                for(let i = 0; i < 200; i++) {
                    confettis.push({
                        x: baseWidth / 2 + (Math.random() * 100 - 50),
                        y: baseHeight + 20,
                        vx: (Math.random() - 0.5) * baseWidth * 1.5,
                        vy: -(Math.random() * baseHeight * 1.2 + 400),
                        size: Math.random() * 8 + 6,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        rotation: Math.random() * 360,
                        dr: (Math.random() - 0.5) * 20
                    });
                }
            } else {
                endTitle.innerText = score >= 6 ? "Bien joué !" : "Entraîne-toi encore !";
                endTitle.className = "text-3xl font-bold mb-4 text-blue-600";
            }
            
            document.getElementById('end-score').innerText = `Score : ${score} / 12`;
        }

        function ajouterFeu() {
            if (feux.length < 6) feux.push({ x: baseWidth*0.1 + Math.random()*(baseWidth*0.8), y: baseHeight * 0.85, i: 20 });
        }

        function update(dt) {
            if (!jeuDemarre || jeuEnPause) return;
            
            // Si le jeu est fini, on met à jour uniquement les confettis (s'il y en a)
            if (jeuFini) {
                if (confettis.length > 0) {
                    confettis.forEach(c => {
                        c.x += c.vx * dt;
                        c.y += c.vy * dt;
                        c.vy += 600 * dt; // Gravité
                        c.vx *= 0.99; // Frottement
                        c.rotation += c.dr;
                    });
                }
                return;
            }
            
            let oldX = helico.x;

            feux.forEach(f => {
                f.i += 8 * dt; // Le feu grandit plus vite
                if(f.i > 150) f.i = 150; // Limite d'intensité pour éviter d'envahir tout l'écran

                // La fumée s'épaissit et s'élargit en fonction de l'intensité (f.i)
                let chanceFumee = (f.i / 50) * dt * 40; 
                let nbParticules = Math.floor(chanceFumee);
                if(Math.random() < chanceFumee - nbParticules) nbParticules++;

                for(let k=0; k<nbParticules; k++) {
                    particulesFumee.push({ 
                        x: f.x + (Math.random() * f.i - f.i/2), // S'étale plus si le feu est grand
                        y: f.y - 10, 
                        vx: Math.random()*20-10, 
                        vy: -40 - Math.random()*(f.i/2), // Monte plus vite et plus haut
                        t: 10 + f.i/4 + Math.random()*20, // Plus grosses particules
                        o: 0.5 + Math.random()*0.4 
                    });
                }
            });

            if (Math.random() < 0.08 * dt && feux.length < 5) ajouterFeu(); // Plus de chances de départs de feu

            for(let i=particulesFumee.length-1; i>=0; i--) {
                let p = particulesFumee[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.t += 10*dt; p.o -= 0.4*dt;
                if (p.o <= 0) particulesFumee.splice(i, 1);
            }
            nuages.forEach(n => { n.x += n.v*dt; if (n.x > baseWidth+100) n.x = -100; });
            for(let i=gouttes.length-1; i>=0; i--) {
                let g = gouttes[i]; g.y += g.vy*dt;
                if (g.y > baseHeight * 0.8) { 
                    gouttes.splice(i, 1); 
                    feux.forEach(f => { if (Math.abs(f.x-g.x) < 80) f.i -= 5; }); // Éteint plus efficacement vu que le feu est plus fort
                }
            }
            feux = feux.filter(f => f.i > 5);

            if (helico.etat === 'patrouille') {
                helico.x += ( (baseWidth/2 + Math.sin(Date.now()/2000)*(baseWidth*0.35)) - helico.x ) * 0.02;
            } else if (helico.etat === 'en_route') {
                let d = helico.targetX - helico.x;
                if (Math.abs(d) < 10) {
                    helico.etat = 'largage';
                    for(let i=0; i<40; i++) gouttes.push({ x: helico.x+(Math.random()*100-50), y: helico.y+30, vy: 300+Math.random()*200 });
                } else helico.x += Math.sign(d) * helico.vitesse * dt;
            } else if (helico.etat === 'largage' && gouttes.length === 0) helico.etat = 'patrouille';

            // Calcul de l'inclinaison de l'hélicoptère
            let dx = helico.x - oldX;
            // Une limite de rotation à ~15 degrés (0.25 radians)
            let targetTilt = Math.max(-0.25, Math.min(0.25, dx * 0.04));
            // Transition douce vers l'angle cible
            helico.tilt = (helico.tilt || 0) + (targetTilt - (helico.tilt || 0)) * 0.15;

            // Ajustement UI Dynamique (ne cache plus l'hélicoptère)
            const uiQ = document.getElementById('ui-question');
            let leftPos = helico.x - uiQ.offsetWidth/2;
            // Contraintes pour ne pas sortir de l'écran sur mobile
            if (leftPos < 10) leftPos = 10;
            if (leftPos + uiQ.offsetWidth > baseWidth - 10) leftPos = baseWidth - uiQ.offsetWidth - 10;
            
            uiQ.style.left = leftPos + "px";
            uiQ.style.top = (helico.y - uiQ.offsetHeight - 40) + "px"; // Toujours au-dessus de l'hélico
        }

        function draw() {
            ctx.clearRect(0, 0, baseWidth, baseHeight);
            
            // 1. Fond forêt adapté à 100% de l'écran
            if (foretLoaded) {
                ctx.drawImage(foretImage, 0, 0, baseWidth, baseHeight);
            } else {
                ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, baseHeight*0.75, baseWidth, baseHeight*0.25);
            }

            // 2. Nuages
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; 
            nuages.forEach(n => { 
                ctx.beginPath(); 
                ctx.arc(n.x, n.y, n.t, 0, Math.PI*2); 
                ctx.arc(n.x + n.t*0.8, n.y - n.t*0.4, n.t*0.8, 0, Math.PI*2);
                ctx.arc(n.x + n.t*1.5, n.y, n.t*0.9, 0, Math.PI*2);
                ctx.arc(n.x + n.t*0.7, n.y + n.t*0.3, n.t*0.7, 0, Math.PI*2);
                ctx.fill(); 
            });

            // 3. Fumée
            particulesFumee.forEach(p => { ctx.fillStyle = `rgba(100, 100, 100, ${p.o})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.t, 0, Math.PI*2); ctx.fill(); });
            
            // 4. Gouttes
            ctx.fillStyle = '#3b82f6'; gouttes.forEach(g => { ctx.beginPath(); ctx.ellipse(g.x, g.y, 4, 8, 0, 0, Math.PI*2); ctx.fill(); });
            
            // 5. Hélicoptère avec rotation
            ctx.save();
            ctx.translate(helico.x, helico.y);
            ctx.rotate(helico.tilt || 0);
            if (helicoLoaded) {
                ctx.drawImage(helicoImage, -80, -40, 160, 80);
            } else {
                ctx.fillStyle = 'red'; ctx.fillRect(-40, -15, 80, 30);
            }
            ctx.restore();

            // 6. Pluie de confettis (si fin de partie avec un 12/12)
            if (jeuFini && confettis.length > 0) {
                confettis.forEach(c => {
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.rotation * Math.PI / 180);
                    ctx.fillStyle = c.color;
                    ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size);
                    ctx.restore();
                });
            }
        }

        function loop(ts) {
            if (lastTime) update((ts - lastTime)/1000);
            draw(); lastTime = ts; requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
